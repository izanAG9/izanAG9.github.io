# ⚠️ If hosting under a repo path, use full URL (e.g. https://<github_username>.github.io/<repo_name>) or images won’t display correctly
baseURL: https://izanag9.github.io/
# Actualización forzada para disparar el despliegue
# El idioma por defecto es Inglés (UK)
defaultContentLanguage: en
title: "Izan | Cloud & Platform Support Engineer"

# Use Hugo modules to add theme
module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts

# Allow raw html in markdown file
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

# At least HTML and JSON are required for the main HTML content and
# client-side JavaScript search
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  # Background image of the landing page
  background: /images/site/backgroundblue.jpg
  
  # Provide logos for your site
  logo:
    main: /images/site/main-logo.png
    inverted: /images/site/inverted-logo.png
    favicon: /images/site/favicon.png

  # GitHub repo of your site
  gitRepo: https://github.com/izanAG9/izanAG9.github.io
  gitBranch: main

  # Configure the number of section title visible in the top navbar
  topNavbar:
    maxVisibleSections: 7

  # Configure various features of this theme
  features:
    theme:
      enable: true
      services:
        light: true 
        dark: true 
        default: system 

    portfolio:
      enable: true

    blog:
      enable: true
      showAuthor: true 
      shareButtons:
        facebook: false
        twitter: false
        linkedin: true
        reddit: false
        whatsapp: false
        email: true

    notes:
      enable: false

    comment:
      enable: false

    analytics:
      enable: true
      services:
        google:
          id: G-H4LBG7NDFZ

    support:
      enable: false

    toc:
      enable: true

    tags:
      enable: true
      on_card: true 

    flags:
      enable: false

    embedpdf:
      enable: true

    flowchart:
      enable: true
      services:
        mermaid:
          theme: forest

    math:
      enable: true
      services:
        katex:
          delimiters:
            - left: $$
              right: $$
              display: true
            - left: \\[
              right: \\]
              display: true
            - left: $
              right: $
              display: false
            - left: \\(
              right: \\)
              display: false

    syntaxHighlight:
      enable: true
      services:
        hljs:
          noHighlightRe: /^no-highlight$/i

    videoPlayer:
      enable: true
      services:
        plyr:
    
    copyCodeButton:
      enable: true

    readingTime:
      enable: false
    
    pagination:
      maxPostsPerPage: 12

  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
      customMenus: true
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
    disclaimer:
      enable: true

  # Custom CSS file
  customCSS:
    - css/custom.css
